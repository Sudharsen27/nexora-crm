services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora
      POSTGRES_DB: nexora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexora"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexora_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - nexora_network

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://nexora:nexora@db:5432/nexora
      SECRET_KEY: dev-secret-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      DEBUG: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - nexora_network

volumes:
  postgres_data:
  redis_data:

networks:
  nexora_network:
    driver: bridge
